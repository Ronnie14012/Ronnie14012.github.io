<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8" />

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0" />

    <title>About</title>

    <link rel="stylesheet"
          href="../assets/css/style.css" />

</head>

<body>

    <!-- =========================
         ABOUT SECTION
    ========================== -->

    <section class="about-section">

        <!-- LEFT SIDE -->

        <div class="about-left">

            <div class="about-image">

                <img src="../assets/images/about.jpg"
                     alt="About Image" />

            </div>

        </div>

        <!-- RIGHT SIDE -->

        <div class="about-right">

            <p class="section-subtitle">

                ABOUT ME

            </p>

            <h1>

                Why Hire Me For Your
                Next Project?

            </h1>

            <p class="about-text">

                I'm a passionate frontend developer
                focused on creating modern,
                responsive and premium web
                experiences with smooth UI/UX.

            </p>

            <!-- SKILLS -->

            <div class="skills">

                <!-- SKILL -->

                <div class="skill">

                    <div class="skill-info">

                        <span>HTML / CSS</span>

                        <span>95%</span>

                    </div>

                    <div class="skill-bar">

                        <div class="skill-progress html">

                        </div>

                    </div>

                </div>

                <!-- SKILL -->

                <div class="skill">

                    <div class="skill-info">

                        <span>JavaScript</span>

                        <span>90%</span>

                    </div>

                    <div class="skill-bar">

                        <div class="skill-progress js">

                        </div>

                    </div>

                </div>

                <!-- SKILL -->

                <div class="skill">

                    <div class="skill-info">

                        <span>React JS</span>

                        <span>85%</span>

                    </div>

                    <div class="skill-bar">

                        <div class="skill-progress react">

                        </div>

                    </div>

                </div>

            </div>

            <!-- EXPERIENCE BOXES -->

            <div class="experience-container">

                <div class="experience-box">

                    <h2>5+</h2>

                    <p>Years Experience</p>

                </div>

                <div class="experience-box">

                    <h2>50+</h2>

                    <p>Completed Projects</p>

                </div>

            </div>

        </div>

    </section>

</body>

</html>
